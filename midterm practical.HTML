<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplication Table Generator</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            background: white;
            padding: 20px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
             }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        

        button:hover {
            background-color: #218838;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            text-align: left;  
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Multiplication Table Generator</h1>

        <input type="number" id="numberInput" placeholder="Enter a number">
        <br>
        <button onclick="generateTable()">Generate Table</button>

        <div id="result"></div>
    </div>

    <!-- External JS -->
    <script src="EXPERIMENT4.JS"></script>

</body>
</html>
